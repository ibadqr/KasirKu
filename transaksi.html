<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaksi — KasirKu POS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        surface:'#0f0f0f', card:'#1a1a1a', border:'#2a2a2a',
        accent:'#10b981','accent-soft':'#064e3b', muted:'#6b7280', bright:'#f9fafb',
      },
      fontFamily: { sans:['DM Sans','sans-serif'], mono:['DM Mono','monospace'] }
    }
  }
}
</script>
<style>
  body { background:#0f0f0f; }
  .card { background:#1a1a1a; border:1px solid #2a2a2a; }
  .sidebar-link { transition:all 0.15s; }
  .sidebar-link:hover { background:#064e3b; color:#10b981; }
  .sidebar-link.active { background:#064e3b; color:#10b981; }
  .input-field { background:#141414; border:1px solid #2a2a2a; color:#f9fafb; }
  .input-field:focus { border-color:#10b981; outline:none; }
  .trx-row { transition:all 0.15s; cursor:pointer; }
  .trx-row:hover { background:#1f1f1f; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation:fadeUp 0.35s ease forwards; }
</style>
</head>
<body class="font-sans text-bright min-h-screen flex">

<!-- Sidebar -->
<aside class="hidden md:flex flex-col w-56 min-h-screen card border-r border-border fixed left-0 top-0 z-30">
  <div class="p-5 border-b border-border">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#10b981,#059669)">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      </div>
      <span class="font-bold text-sm">KasirKu</span>
    </div>
  </div>
  <nav class="flex-1 p-3 space-y-1">
    <a href="dashboard.html" class="sidebar-link text-muted flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"/></svg> Dashboard</a>
    <a href="kasir.html" class="sidebar-link text-muted flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg> Kasir</a>
    <a href="produk.html" class="sidebar-link text-muted flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg> Produk</a>
    <a href="transaksi.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg> Transaksi</a>
    <a href="user.html" id="adminMenu" class="hidden sidebar-link text-muted flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg> Users</a>
  </nav>
  <div class="p-3 border-t border-border">
    <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-muted hover:text-red-400 hover:bg-red-900/20 transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Keluar</button>
  </div>
</aside>

<!-- Mobile bar -->
<div class="md:hidden fixed top-0 left-0 right-0 z-40 card border-b border-border px-4 py-3 flex items-center justify-between">
  <span class="font-bold text-sm">Transaksi</span>
  <a href="dashboard.html" class="text-muted p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></a>
</div>

<!-- Main -->
<main class="flex-1 md:ml-56 pt-16 md:pt-0 min-h-screen">
  <div class="p-4 md:p-6 max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6 fade-up">
      <div>
        <h1 class="text-xl font-bold text-bright">Riwayat Transaksi</h1>
        <p class="text-muted text-sm mt-0.5" id="trxCount">Memuat...</p>
      </div>
      <button onclick="exportCSV()" class="hidden md:flex items-center gap-2 px-4 py-2.5 rounded-xl border border-border text-sm text-muted hover:text-bright hover:border-accent transition-all">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Export CSV
      </button>
    </div>

    <!-- Filters -->
    <div class="flex gap-3 mb-4 flex-wrap fade-up">
      <input id="filterDate" type="date" class="input-field px-3 py-2.5 rounded-xl text-sm" onchange="loadTransactions()">
      <select id="filterMethod" class="input-field px-3 py-2.5 rounded-xl text-sm" onchange="loadTransactions()">
        <option value="">Semua Metode</option>
        <option value="cash">Cash</option>
        <option value="transfer">Transfer</option>
        <option value="ewallet">E-Wallet</option>
      </select>
      <button onclick="clearFilters()" class="px-3 py-2.5 rounded-xl border border-border text-sm text-muted hover:text-bright transition-all">Reset</button>
    </div>

    <!-- Summary bar -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4 fade-up">
      <div class="card rounded-2xl p-4">
        <p class="text-xs text-muted mb-1">Total Pendapatan</p>
        <p class="text-lg font-bold text-accent font-mono" id="sumTotal">Rp 0</p>
      </div>
      <div class="card rounded-2xl p-4">
        <p class="text-xs text-muted mb-1">Jumlah Transaksi</p>
        <p class="text-lg font-bold text-bright font-mono" id="sumCount">0</p>
      </div>
      <div class="card rounded-2xl p-4 col-span-2 md:col-span-1">
        <p class="text-xs text-muted mb-1">Rata-rata / Transaksi</p>
        <p class="text-lg font-bold text-bright font-mono" id="sumAvg">Rp 0</p>
      </div>
    </div>

    <!-- Table -->
    <div class="card rounded-2xl overflow-hidden fade-up">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-border">
            <th class="text-left px-4 py-3.5 text-xs font-semibold text-muted uppercase">ID</th>
            <th class="text-left px-4 py-3.5 text-xs font-semibold text-muted uppercase hidden md:table-cell">Waktu</th>
            <th class="text-left px-4 py-3.5 text-xs font-semibold text-muted uppercase">Metode</th>
            <th class="text-right px-4 py-3.5 text-xs font-semibold text-muted uppercase">Total</th>
            <th class="px-4 py-3.5"></th>
          </tr>
        </thead>
        <tbody id="trxTable"></tbody>
      </table>
      <div id="trxEmpty" class="hidden text-center py-12 text-muted text-sm">
        <svg class="w-8 h-8 mx-auto mb-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
        Tidak ada transaksi
      </div>
    </div>
  </div>
</main>

<!-- Detail modal -->
<div id="detailModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4" style="background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)">
  <div class="card rounded-2xl w-full max-w-md p-6 max-h-[80vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-4">
      <h3 class="font-bold text-bright">Detail Transaksi</h3>
      <button onclick="closeDetail()" class="text-muted hover:text-bright"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
let transactions = [];

async function initTrx() {
  await requireAuth();
  if (localStorage.getItem('userRole') === 'admin') document.getElementById('adminMenu').classList.remove('hidden');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('filterDate').value = today;
  await loadTransactions();
}

async function loadTransactions() {
  const date = document.getElementById('filterDate').value;
  const method = document.getElementById('filterMethod').value;

  let query = sb.from('transactions').select('*, transaction_items(qty, price, product_id, products(name))').order('created_at', { ascending:false });

  if (date) {
    query = query.gte('created_at', date + 'T00:00:00').lte('created_at', date + 'T23:59:59');
  }
  if (method) query = query.eq('payment_method', method);

  const { data, error } = await query;
  if (error) return showToast('Gagal memuat transaksi', 'error');
  transactions = data || [];

  updateSummary();
  renderTable();
}

function updateSummary() {
  const total = transactions.reduce((s, t) => s + Number(t.total), 0);
  const count = transactions.length;
  document.getElementById('sumTotal').textContent = formatRp(total);
  document.getElementById('sumCount').textContent = count;
  document.getElementById('sumAvg').textContent = count ? formatRp(Math.round(total / count)) : 'Rp 0';
  document.getElementById('trxCount').textContent = `${count} transaksi ditemukan`;
}

function renderTable() {
  const tbody = document.getElementById('trxTable');
  const empty = document.getElementById('trxEmpty');
  if (!transactions.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const methodBadge = { cash:'💵 Cash', transfer:'🏦 Transfer', ewallet:'📱 E-Wallet' };
  tbody.innerHTML = transactions.map(t => `
    <tr class="trx-row border-b border-border last:border-0" onclick="showDetail('${t.id}')">
      <td class="px-4 py-3.5">
        <span class="font-mono text-xs text-muted">#${t.id.slice(-8).toUpperCase()}</span>
      </td>
      <td class="px-4 py-3.5 hidden md:table-cell">
        <span class="text-sm text-bright">${new Date(t.created_at).toLocaleDateString('id-ID', {day:'2-digit',month:'short'})}</span>
        <span class="text-xs text-muted ml-1">${new Date(t.created_at).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</span>
      </td>
      <td class="px-4 py-3.5">
        <span class="text-xs px-2.5 py-1 rounded-full" style="background:#1f2937;color:#9ca3af">${methodBadge[t.payment_method] || t.payment_method}</span>
      </td>
      <td class="px-4 py-3.5 text-right font-mono font-bold text-accent">${formatRp(t.total)}</td>
      <td class="px-4 py-3.5 text-right">
        <svg class="w-4 h-4 text-muted ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </td>
    </tr>
  `).join('');
}

function showDetail(id) {
  const trx = transactions.find(t => t.id === id);
  if (!trx) return;

  const items = trx.transaction_items || [];
  const content = `
    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="card rounded-xl p-3">
          <p class="text-xs text-muted mb-0.5">ID Transaksi</p>
          <p class="font-mono text-xs text-bright">#${trx.id.slice(-8).toUpperCase()}</p>
        </div>
        <div class="card rounded-xl p-3">
          <p class="text-xs text-muted mb-0.5">Waktu</p>
          <p class="text-xs text-bright">${formatDate(trx.created_at)}</p>
        </div>
        <div class="card rounded-xl p-3">
          <p class="text-xs text-muted mb-0.5">Metode</p>
          <p class="text-sm font-semibold capitalize text-bright">${trx.payment_method}</p>
        </div>
        <div class="card rounded-xl p-3">
          <p class="text-xs text-muted mb-0.5">Total</p>
          <p class="text-sm font-bold text-accent font-mono">${formatRp(trx.total)}</p>
        </div>
      </div>
      <div>
        <p class="text-xs font-semibold text-muted mb-2 uppercase tracking-wider">Item Dibeli</p>
        <div class="space-y-2">
          ${items.map(i => `
            <div class="flex items-center justify-between p-3 rounded-xl" style="background:#0f0f0f">
              <div>
                <p class="text-sm font-medium text-bright">${i.products?.name || 'Produk'}</p>
                <p class="text-xs text-muted">${formatRp(i.price)} × ${i.qty}</p>
              </div>
              <p class="font-mono font-semibold text-accent">${formatRp(i.price * i.qty)}</p>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="border-t border-border pt-3 flex justify-between items-center">
        <span class="font-semibold text-bright">Total Bayar</span>
        <span class="font-mono font-bold text-accent text-lg">${formatRp(trx.total)}</span>
      </div>
    </div>
  `;

  document.getElementById('detailContent').innerHTML = content;
  document.getElementById('detailModal').classList.remove('hidden');
  document.getElementById('detailModal').classList.add('flex');
}

function closeDetail() {
  document.getElementById('detailModal').classList.add('hidden');
  document.getElementById('detailModal').classList.remove('flex');
}

function clearFilters() {
  document.getElementById('filterDate').value = '';
  document.getElementById('filterMethod').value = '';
  loadTransactions();
}

function exportCSV() {
  if (!transactions.length) return showToast('Tidak ada data untuk diekspor', 'warn');
  const rows = [['ID', 'Tanggal', 'Waktu', 'Metode', 'Total']];
  transactions.forEach(t => {
    const d = new Date(t.created_at);
    rows.push([
      '#' + t.id.slice(-8).toUpperCase(),
      d.toLocaleDateString('id-ID'),
      d.toLocaleTimeString('id-ID'),
      t.payment_method,
      t.total
    ]);
  });

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `transaksi_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV berhasil diunduh', 'success');
}

document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === document.getElementById('detailModal')) closeDetail();
});

initTrx();
</script>
</body>
</html>
