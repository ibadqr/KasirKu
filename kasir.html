<script src="app.js"></script>
<script>
let products = [];
let cart = [];
let filteredProducts = [];
let activeCategory = 'all';
let currentSession = null;

async function initKasir() {
  currentSession = await requireAuth();
  if (!currentSession) return;
  if (localStorage.getItem('userRole') === 'admin') {
    document.getElementById('adminMenu').classList.remove('hidden');
  }
  await loadProducts();
  document.getElementById('paymentMethod').addEventListener('change', toggleCashSection);
  buildQuickCash();
}

async function loadProducts() {
  const { data, error } = await sb.from('products').select('*').order('name');
  if (error) return showToast('Gagal memuat produk', 'error');
  products = data || [];
  filteredProducts = [...products];

  // Categories
  const cats = ['all', ...new Set(products.map(p => p.category).filter(Boolean))];
  const tabsEl = document.getElementById('categoryTabs');
  tabsEl.innerHTML = cats.map(c => `
    <button onclick="filterByCategory('${c}')"
      class="category-tab ${c === activeCategory ? 'active' : 'text-muted border-border'} whitespace-nowrap px-3 py-1.5 rounded-full text-xs font-medium border">
      ${c === 'all' ? 'Semua' : c}
    </button>
  `).join('');

  renderProducts();
}

function filterByCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.category-tab').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (cat === 'all' ? 'Semua' : cat));
    b.classList.toggle('text-muted', b.textContent.trim() !== (cat === 'all' ? 'Semua' : cat));
  });
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredProducts = products.filter(p => {
    const matchCat = activeCategory === 'all' || p.category === activeCategory;
    const matchQ = p.name.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('productGrid');
  if (!filteredProducts.length) {
    grid.innerHTML = '<div class="col-span-full text-center py-12 text-muted text-sm">Produk tidak ditemukan</div>';
    return;
  }
  grid.innerHTML = filteredProducts.map(p => `
    <div class="product-card card rounded-2xl p-3 flex flex-col gap-2 ${p.stock <= 0 ? 'opacity-40 pointer-events-none' : ''}"
      onclick="addToCart(${p.id})">
      ${p.image_url
        ? `<img src="${p.image_url}" alt="${p.name}" class="w-full aspect-square object-cover rounded-xl" loading="lazy">`
        : `<div class="w-full aspect-square rounded-xl flex items-center justify-center text-3xl" style="background:#2a2a2a">🍵</div>`
      }
      <div>
        <p class="text-xs font-semibold text-bright leading-tight line-clamp-2">${p.name}</p>
        <p class="text-xs text-muted mt-0.5">${p.category || '—'}</p>
        <div class="flex items-center justify-between mt-1.5">
          <span class="text-sm font-bold text-accent font-mono">${formatRp(p.price)}</span>
          ${p.stock <= 5 ? `<span class="text-xs text-amber-400">${p.stock} sisa</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  if (!product || product.stock <= 0) return;

  const existing = cart.find(i => i.id === productId);
  const currentQty = existing ? existing.qty : 0;

  if (currentQty >= product.stock) {
    return showToast(`Stok ${product.name} tidak cukup`, 'warn');
  }

  if (existing) {
    existing.qty++;
  } else {
    cart.push({ id: product.id, name: product.name, price: product.price, qty: 1, stock: product.stock });
  }
  renderCart();
  showToast(`${product.name} ditambahkan`, 'success');
}

function updateQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  renderCart();
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

function getTotal() {
  return cart.reduce((s, i) => s + i.price * i.qty, 0);
}

function renderCart() {
  const total = getTotal();
  const isEmpty = cart.length === 0;

  // Desktop
  const itemsEl = document.getElementById('cartItems');
  document.getElementById('emptyCart').style.display = isEmpty ? 'block' : 'none';

  const existingItems = itemsEl.querySelectorAll('.cart-item');
  existingItems.forEach(e => e.remove());

  cart.forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item flex items-center gap-2 p-2.5 rounded-xl hover:bg-black/20 transition-colors';
    div.innerHTML = `
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-bright truncate">${item.name}</p>
        <p class="text-xs font-mono text-accent">${formatRp(item.price)}</p>
      </div>
      <div class="flex items-center gap-1.5">
        <button onclick="updateQty(${item.id},-1)" class="w-6 h-6 rounded-lg border border-border text-xs text-muted hover:text-bright hover:border-accent flex items-center justify-center transition-all">−</button>
        <span class="text-sm font-bold w-5 text-center">${item.qty}</span>
        <button onclick="updateQty(${item.id},1)" class="w-6 h-6 rounded-lg border border-border text-xs text-muted hover:text-bright hover:border-accent flex items-center justify-center transition-all">+</button>
        <button onclick="removeFromCart(${item.id})" class="w-6 h-6 rounded-lg text-xs text-red-400 hover:bg-red-900/30 flex items-center justify-center ml-1">✕</button>
      </div>
    `;
    itemsEl.appendChild(div);
  });

  document.getElementById('cartTotal').textContent = formatRp(total);
  calcChange();

  // Mobile
  document.getElementById('mobileCartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('mobileTotal').textContent = formatRp(total);
  document.getElementById('mobileCartTotal').textContent = formatRp(total);
  document.getElementById('mobilePayTotal').textContent = formatRp(total);

  const mobileItemsEl = document.getElementById('mobileCartItems');
  mobileItemsEl.innerHTML = cart.map(item => `
    <div class="flex items-center gap-2 p-2.5 rounded-xl border border-border">
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-bright truncate">${item.name}</p>
        <p class="text-xs font-mono text-accent">${formatRp(item.price * item.qty)}</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="updateQty(${item.id},-1)" class="w-7 h-7 rounded-xl border border-border text-sm text-muted flex items-center justify-center">−</button>
        <span class="text-sm font-bold w-5 text-center">${item.qty}</span>
        <button onclick="updateQty(${item.id},1)" class="w-7 h-7 rounded-xl border border-border text-sm text-muted flex items-center justify-center">+</button>
      </div>
    </div>
  `).join('') || '<p class="text-xs text-muted text-center py-4">Keranjang kosong</p>';
}

function calcChange() {
  const cash = Number(document.getElementById('cashInput').value);
  const total = getTotal();
  const change = cash - total;
  document.getElementById('changeAmount').textContent = formatRp(Math.max(0, change));
  document.getElementById('changeAmount').style.color = change < 0 ? '#f87171' : '#10b981';
}

function calcMobileChange() {
  const cash = Number(document.getElementById('mobileCashInput').value);
  const total = getTotal();
  const change = cash - total;
  document.getElementById('mobileChange').textContent = formatRp(Math.max(0, change));
  document.getElementById('mobileChange').style.color = change < 0 ? '#f87171' : '#10b981';
}

function toggleCashSection() {
  const method = document.getElementById('paymentMethod').value;
  document.getElementById('cashSection').style.display = method === 'cash' ? 'block' : 'none';
}

function toggleMobileCash() {
  const method = document.getElementById('mobilePaymentMethod').value;
  document.getElementById('mobileCashSection').style.display = method === 'cash' ? 'block' : 'none';
}

function buildQuickCash() {
  const total = getTotal();
  const options = [10000, 20000, 50000, 100000, 50000*Math.ceil(total/50000)];
  const unique = [...new Set(options)].filter(v => v >= total).slice(0, 3);
  document.getElementById('quickCash').innerHTML = unique.map(v => `
    <button onclick="document.getElementById('cashInput').value=${v};calcChange()"
      class="text-xs px-2 py-1.5 rounded-lg border border-border text-muted hover:text-bright hover:border-accent transition-all font-mono">
      ${v >= 1000000 ? (v/1000000) + 'jt' : (v/1000) + 'rb'}
    </button>
  `).join('');

  document.getElementById('mobileQuickCash').innerHTML = unique.map(v => `
    <button onclick="document.getElementById('mobileCashInput').value=${v};calcMobileChange()"
      class="text-sm px-3 py-2 rounded-xl border border-border text-muted hover:text-bright hover:border-accent transition-all font-mono">
      ${v >= 1000000 ? (v/1000000) + 'jt' : (v/1000) + 'rb'}
    </button>
  `).join('');
}

function toggleMobileCart() {
  const drawer = document.getElementById('mobileCartDrawer');
  const chevron = document.getElementById('cartChevron');
  drawer.classList.toggle('hidden');
  chevron.style.transform = drawer.classList.contains('hidden') ? '' : 'rotate(180deg)';
}

function showMobilePayment() {
  if (!cart.length) return showToast('Keranjang kosong', 'warn');
  document.getElementById('mobileCartDrawer').classList.add('hidden');
  document.getElementById('mobilePayModal').classList.remove('hidden');
  document.getElementById('mobilePayModal').classList.add('flex');
  buildQuickCash();
}

function closeMobilePayment() {
  document.getElementById('mobilePayModal').classList.add('hidden');
  document.getElementById('mobilePayModal').classList.remove('flex');
}

async function doPayment(method, cashPaid) {
  if (!cart.length) return showToast('Keranjang kosong', 'warn');
  const total = getTotal();

  if (method === 'cash') {
    const cash = Number(cashPaid);
    if (cash < total) return showToast('Uang bayar kurang!', 'error');
  }

  const btn = document.getElementById('payBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Memproses...'; }

  try {
    const { data: { user } } = await sb.auth.getUser();
    const { data: trx, error: trxErr } = await sb.from('transactions').insert({
      total, payment_method: method, user_id: user.id
    }).select().single();
    if (trxErr) throw trxErr;

    const items = cart.map(i => ({
      transaction_id: trx.id,
      product_id: i.id,
      qty: i.qty,
      price: i.price
    }));
    await sb.from('transaction_items').insert(items);

    // Update stock
    for (const i of cart) {
      const prod = products.find(p => p.id === i.id);
      if (prod) await sb.from('products').update({ stock: prod.stock - i.qty }).eq('id', i.id);
    }

    // Print receipt
    printReceipt(trx, method, cashPaid, total);

    showToast('✅ Pembayaran berhasil!', 'success');
    clearCart();
    await loadProducts();
    closeMobilePayment();
  } catch (err) {
    showToast('Gagal menyimpan transaksi: ' + err.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '💳 Bayar Sekarang'; }
  }
}

async function processPayment() {
  const method = document.getElementById('paymentMethod').value;
  const cash = document.getElementById('cashInput').value;
  await doPayment(method, cash);
  document.getElementById('cashInput').value = '';
  calcChange();
}

async function processPaymentMobile() {
  const method = document.getElementById('mobilePaymentMethod').value;
  const cash = document.getElementById('mobileCashInput').value;
  await doPayment(method, cash);
  document.getElementById('mobileCashInput').value = '';
}

function printReceipt(trx, method, cashPaid, total) {
  document.getElementById('rptDate').textContent = new Date().toLocaleString('id-ID');
  document.getElementById('rptId').textContent = '#' + trx.id.slice(-8).toUpperCase();
  document.getElementById('rptItems').innerHTML = cart.map(i =>
    `<div class="flex justify-between"><span>${i.name} x${i.qty}</span><span>${formatRp(i.price * i.qty)}</span></div>`
  ).join('');
  document.getElementById('rptTotal').textContent = formatRp(total);
  document.getElementById('rptPay').textContent = method === 'cash' ? formatRp(cashPaid) : method;
  document.getElementById('rptChange').textContent = method === 'cash' ? formatRp(Math.max(0, cashPaid - total)) : '-';
  document.getElementById('rptMethod').textContent = method;

  setTimeout(() => window.print(), 200);
}

initKasir();
</script>
</body>
</html>
